name: Database schema sync

# Syncs the production database to prisma/schema.prisma via `prisma db push`,
# on merge to main (schema changes) or on demand. Runs SEPARATELY from the
# Vercel web build (per the project guardrail: never run schema changes inside
# the web build). `db push` is used instead of `migrate deploy` because this DB
# was provisioned with db push and drifts from the migration history; db push
# applies the missing columns/tables and aborts (no --accept-data-loss) rather
# than drop anything.
#
# Setup (one-time): add a repo secret MIGRATE_DATABASE_URL set to the DIRECT
# (non-pooled) Postgres connection string — NOT the Accelerate prisma:// URL.
# Settings → Secrets and variables → Actions → New repository secret.
# Then run it: Actions → "Database schema sync" → Run workflow.

on:
  push:
    branches: [main]
    paths:
      - "prisma/migrations/**"
      - "prisma/schema.prisma"
      - ".github/workflows/db-migrate.yml"
  workflow_dispatch: {}

concurrency:
  group: db-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.MIGRATE_DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Require MIGRATE_DATABASE_URL secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::MIGRATE_DATABASE_URL secret is not set. Add the DIRECT (non-pooled) Postgres URL in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      # The production DB was provisioned with `prisma db push` (no reliable
      # migration history), and features have since been added to schema.prisma
      # the same way — so `migrate deploy` drifts (it can't apply schema-only
      # changes, and fails on "already exists" against this DB). `db push` syncs
      # the database to schema.prisma directly: it applies whatever columns/
      # tables are missing and, without --accept-data-loss, ABORTS rather than
      # drop anything. This is the reliable, non-destructive sync for this DB.
      - name: Sync schema to database (prisma db push)
        run: npx prisma db push
